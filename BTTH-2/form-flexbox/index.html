<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Form-Flexbox</title>
</head>

<body>
    <div class="container">
        <form action="">
            <h2>Get in touch with us by filling contact form Flexbox</h2>
                <div class="col">
                    <input type="text" name="fullname" id="fullname" placeholder="* Enter your full name" required>
                    <input type="email" name="email" id="email" placeholder="* Enter your email address" required>
                </div>

                <div class="col">
                    <input type="text" name="mon_hoc" id="mon_hoc" placeholder="Enter your subject">
                </div>
                <div class="col">
                    <textarea name="message" id="message"
                        placeholder="* Your message here..." required></textarea>
                </div>
            
            <div class="btn-submit">
                <button type="submit">Send message</button>
                <span>* Please fill all required form field, thanks!</span>
            </div>
        </form>
    </div>
</body>

</html>
