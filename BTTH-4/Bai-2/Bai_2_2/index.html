<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Form Đặt Hàng</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/jquery.validation/1.19.5/jquery.validate.min.js"></script>

    <style>
        .error {
            color: red;
            font-size: 14px;
        }

        #noteCount.red {
            color: red;
        }
    </style>

</head>

<body class="container mt-4">

    <h3>Form Đặt Hàng</h3>

    <form id="orderForm">

        <div class="mb-3">
            <label class="form-label">Tên sản phẩm</label>

            <select id="product" class="form-select">
                <option value="">-- Chọn sản phẩm --</option>
                <option value="ao">Áo</option>
                <option value="quan">Quần</option>
                <option value="giay">Giày</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Số lượng</label>
            <input type="number" id="quantity" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Ngày giao hàng</label>
            <input type="date" id="delivery" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Địa chỉ giao</label>
            <input type="text" id="address" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Ghi chú</label>
            <textarea id="note" class="form-control"></textarea>
            <div id="noteCount" class="text-muted">0/200</div>
        </div>

        <div class="mb-3">
            <label class="form-label">Phương thức thanh toán</label><br>

            <input type="radio" name="payment" value="COD"> COD
            <input type="radio" name="payment" value="Bank" class="ms-3"> Chuyển khoản
            <input type="radio" name="payment" value="Wallet" class="ms-3"> Ví điện tử
        </div>

        <div class="mb-3">
            <h5>Tổng tiền: <span id="total">0</span> VND</h5>
        </div>

        <button class="btn btn-primary" type="submit">Đặt hàng</button>

    </form>


    <!-- xác nhận đơn hàng-->
    <div id="confirmBox" class="card mt-4 p-3" style="display:none">

        <h5>Xác nhận đặt hàng?</h5>

        <div id="summary" class="mb-3"></div>

        <button id="confirmBtn" class="btn btn-success">Xác nhận</button>
        <button id="cancelBtn" class="btn btn-secondary">Hủy</button>

    </div>

    <div id="success" class="alert alert-success mt-3" style="display:none">
        Đặt hàng thành công 🎉
    </div>


    <script src="order.js"></script>

</body>

</html>
