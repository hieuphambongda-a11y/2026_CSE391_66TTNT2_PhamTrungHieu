<!DOCTYPE html>
<html lang="vi">
<meta charset="UTF-8">
<title>Quản lý sinh viên</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<body class="bg-light">
  <!-- 1.1 +1.2  -->
  <div class="container mt-5">
    <h2 class="text-center mb-4">Quản lý sinh viên</h2>

    <div id="message" class="mb-2"></div>

    <div class="row g-3 mb-4">
      <div class="col-5">
        <input type="text" id="name" class="form-control" placeholder="Nhập họ tên">
      </div>
      <div class="col-3">
        <input type="number" id="score" class="form-control" placeholder="Nhập điểm">
      </div>
      <div class="col-2">
        <button id="addBtn" class="btn btn-primary">Thêm</button>
      </div>
    </div>


    <div class="row g-2 mb-3">
      <div class="col-md-5">
        <input type="text" id="searchInput" class="form-control" placeholder="Tìm kiếm theo tên...">
      </div>
      <div class="col-md-3">
        <select id="filterSelect" class="form-select">
          <option value="">Tất cả xếp loại</option>
          <option value="Giỏi">Giỏi</option>
          <option value="Khá">Khá</option>
          <option value="Trung bình">Trung bình</option>
          <option value="Yếu">Yếu</option>
        </select>
      </div>
      <div class="col-md-2">
        <button id="resetBtn" class="btn btn-outline-secondary">Đặt lại</button>
      </div>
    </div>

    <table class="table text-center">
      <thead class="table-secondary">
        <tr>
          <th>STT</th>
          <th>Họ tên</th>
          <th id="colScore" class="user-select-none">Điểm <span id="sortArrow"></span></th>
          <th>Xếp loại</th>
          <th>Hành động</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>

    <div id="noResult" class="text-center py-2 d-none">
      Không có kết quả
    </div>

    <p id="stats" class="fw-bold">
      Tổng sinh viên: 0 | Điểm trung bình: 0
    </p>
  </div>

  <script src="Filters.js"></script>
  <script src="script.js"></script>
</body>

</html>
