<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Form Đăng Ký</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<style>

.error{
color:red;
font-size:14px;
}

</style>

</head>

<body class="container mt-5">

<h3>Form Đăng Ký</h3>

<form id="demoForm">

<div class="mb-3">

<label class="form-label">Họ tên</label>

<input type="text" name="fullname" class="form-control" maxlength="50">

<small id="nameCount" class="text-muted">0/50</small>

</div>

<div class="mb-3">

<label class="form-label">Email</label>

<input type="text" name="user" class="form-control">

</div>

<div class="mb-3">

<label class="form-label">Số điện thoại</label>

<input type="text" name="phone" class="form-control">

</div>

<div class="mb-3">

<label class="form-label">Mật khẩu</label>

<div class="input-group">

<input type="password" id="password" name="password" class="form-control">
<button type="button" id="togglePass" class="btn btn-outline-secondary">
👁
</button>

</div>

<div class="progress mt-2" style="height:8px">

<div id="strengthBar" class="progress-bar"></div>

</div>

<small id="strengthText"></small>

</div>

<div class="mb-3">

<label class="form-label">Xác nhận mật khẩu</label>

<input type="password" name="re-password" class="form-control">

</div>

<div class="mb-3">

<label class="form-label">Giới tính</label><br>

<label>
<input type="radio" name="gender" value="Nam"> Nam
</label>

<label class="ms-3">
<input type="radio" name="gender" value="Nữ"> Nữ
</label>

</div>

<div class="mb-3">

<label>
<input type="checkbox" name="terms"> Đồng ý điều khoản
</label>

</div>

<button type="submit" class="btn btn-primary">
Đăng ký
</button>

</form>

<div id="success" class="alert alert-success mt-3" style="display:none"></div>

<script src="register.js"></script>

</body>
</html>
