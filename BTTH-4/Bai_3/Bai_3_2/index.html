<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Multi Step Form</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        .step {
            display: none;
        }

        .error {
            color: red;
            font-size: 14px;
        }
    </style>

</head>

<body class="container mt-5">

    <h3>Form Đăng Ký Nhiều Bước</h3>

    <div class="progress mb-4">
        <div id="progressBar" class="progress-bar" style="width:33%">Bước 1/3</div>
    </div>

    <form id="multiForm">

        <!-- STEP 1 -->

        <div id="step1" class="step" style="display:block">

            <h5>Thông tin cá nhân</h5>

            <div class="mb-3">
                <label>Họ tên</label>
                <input type="text" id="fullname" class="form-control">
            </div>

            <div class="mb-3">
                <label>Ngày sinh</label>
                <input type="date" id="dob" class="form-control">
            </div>

            <div class="mb-3">
                <label>Giới tính</label><br>

                <label>
                    <input type="radio" name="gender" value="Nam"> Nam
                </label>

                <label class="ms-3">
                    <input type="radio" name="gender" value="Nữ"> Nữ
                </label>

            </div>

            <button type="button" id="next1" class="btn btn-primary">
                Tiếp theo
            </button>

        </div>


        <!-- STEP 2 -->

        <div id="step2" class="step">

            <h5>Thông tin tài khoản</h5>

            <div class="mb-3">
                <label>Email</label>
                <input type="text" id="email" class="form-control">
            </div>

            <div class="mb-3">
                <label>Mật khẩu</label>
                <input type="password" id="password" class="form-control">
            </div>

            <div class="mb-3">
                <label>Xác nhận mật khẩu</label>
                <input type="password" id="repass" class="form-control">
            </div>

            <button type="button" id="back1" class="btn btn-secondary">
                Quay lại
            </button>

            <button type="button" id="next2" class="btn btn-primary">
                Tiếp theo
            </button>

        </div>


        <!-- STEP 3 -->

        <div id="step3" class="step">

            <h5>Xác nhận thông tin</h5>

            <div id="confirmInfo" class="mb-3"></div>

            <button type="button" id="back2" class="btn btn-secondary">
                Quay lại
            </button>

            <button type="submit" class="btn btn-success">
                Đăng ký
            </button>

        </div>

    </form>

    <div id="success" class="alert alert-success mt-4" style="display:none">
        Đăng ký thành công 🎉
    </div>

    <script src="multi.js"></script>

</body>

</html>
